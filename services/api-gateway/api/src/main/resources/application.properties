spring.application.name=api-gateway
server.port=8080

# ── Downstream Service URLs ─────────────────────────────────────────────────
gateway.ingestion.url=http://localhost:8081
gateway.extraction.url=http://localhost:8082
gateway.processing.url=http://localhost:8083
gateway.ranking.url=http://localhost:8084
gateway.database.url=http://localhost:8085
gateway.analytics.url=http://localhost:8086

# ── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.threat=DEBUG
