spring.application.name=database-service
server.port=8085

# ── MySQL ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/CCP?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Read-only view of the shared schema – no DDL changes from this service
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Logging ────────────────────────────────────────────────────────────────
logging.level.com.threat=INFO
