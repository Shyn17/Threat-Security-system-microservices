spring.application.name=extraction-service
server.port=8082

spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=extraction-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.consumer.properties.reconnect.backoff.ms=2000
spring.kafka.consumer.properties.reconnect.backoff.max.ms=30000
spring.kafka.consumer.properties.retry.backoff.ms=3000
spring.kafka.consumer.properties.request.timeout.ms=30000
spring.kafka.consumer.properties.session.timeout.ms=30000
spring.kafka.consumer.properties.heartbeat.interval.ms=10000

spring.kafka.listener.missing-topics-fatal=false

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=1
spring.kafka.producer.retries=5
spring.kafka.producer.properties.retry.backoff.ms=3000
spring.kafka.producer.properties.reconnect.backoff.ms=2000
spring.kafka.producer.properties.reconnect.backoff.max.ms=30000

logging.level.com.threat=DEBUG
logging.level.org.apache.kafka.clients.NetworkClient=ERROR