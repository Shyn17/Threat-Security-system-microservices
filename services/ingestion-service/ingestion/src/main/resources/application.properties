spring.application.name=ingestion-service
server.port=8081

# ── Kafka ──────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=1
spring.kafka.producer.retries=5
spring.kafka.producer.properties.retry.backoff.ms=3000
spring.kafka.producer.properties.reconnect.backoff.ms=2000
spring.kafka.producer.properties.reconnect.backoff.max.ms=30000

# ── External API Keys ──────────────────────────────────────────────────────
# Set these via environment variables or a local .env file (never commit real keys!)
# AbuseIPDB  (https://www.abuseipdb.com/account/api)
abuseipdb.api.key=${ABUSEIPDB_API_KEY}

# AlienVault OTX (https://otx.alienvault.com/api)
alienvault.api.key=${ALIENVAULT_API_KEY}

# ── Logging ────────────────────────────────────────────────────────────────
logging.level.com.threat=DEBUG
logging.level.org.apache.kafka.clients.NetworkClient=ERROR