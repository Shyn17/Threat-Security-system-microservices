spring.application.name=processing-service
server.port=8083

# ── MySQL ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/CCP?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Kafka ──────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092

# Consumer
spring.kafka.consumer.group-id=processing-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Consumer retry/reconnect – tolerates a temporarily unavailable broker
spring.kafka.consumer.properties.reconnect.backoff.ms=2000
spring.kafka.consumer.properties.reconnect.backoff.max.ms=30000
spring.kafka.consumer.properties.retry.backoff.ms=3000
spring.kafka.consumer.properties.request.timeout.ms=30000
spring.kafka.listener.missing-topics-fatal=false

# ── Service URLs ───────────────────────────────────────────────────────────
ranking.service.url=http://localhost:8084

# ── Logging ────────────────────────────────────────────────────────────────
logging.level.com.treath=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.apache.kafka.clients.NetworkClient=ERROR
