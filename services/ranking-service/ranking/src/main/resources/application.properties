spring.application.name=ranking-service
server.port=8084

# ── Kafka ──────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092

# ── External API Keys ──────────────────────────────────────────────────────
# Set these via environment variables or a local .env file (never commit real keys!)
# AbuseIPDB check endpoint
abuseipdb.api.key=${ABUSEIPDB_API_KEY}
# AlienVault OTX (used for domain ranking)
alienvault.api.key=${ALIENVAULT_API_KEY}

# ── Service URLs ───────────────────────────────────────────────────────────
processing.service.url=http://localhost:8083

# ── Scheduler ─────────────────────────────────────────────────────────────
# Interval in ms between ranking runs (default: 60 seconds)
ranking.scheduler.interval-ms=60000

# ── Logging ────────────────────────────────────────────────────────────────
logging.level.com.threat=DEBUG
