# ── Test-only overrides ────────────────────────────────────────────────────
# These values satisfy the @Value placeholders so the ApplicationContext can load
# without real environment variables or running infrastructure.

spring.application.name=ranking-service

# Disable Kafka auto-configuration (no broker required for tests)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Placeholder API keys (never used in tests – mocks intercept all HTTP calls)
abuseipdb.api.key=test-abuse-key
alienvault.api.key=test-av-key

# Processing service URL (mocked in unit tests)
processing.service.url=http://localhost:8083

# Disable the scheduler so it doesn't fire during context-load tests
spring.task.scheduling.enabled=false
ranking.scheduler.interval-ms=999999999
